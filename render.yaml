# https://render.com/docs/blueprint-spec
# Ensures build/start run from backend/ so `uvicorn app.main:app` resolves the `app` package.
services:
  - type: web
    name: oncall-rca-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
